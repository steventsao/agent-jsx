name: CI

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test build and package
        run: bun run ci

  compatibility:
    name: Compatibility / ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: chess
            command: bun run typecheck && bun run test
          - target: cloudflare
            command: bun run typecheck && bun run test
          - target: document-review
            command: bun run typecheck && bun run test
          - target: flue
            command: bun run test
          - target: pdf-compiled
            command: bun run test
          - target: pdf-target
            command: bun run typecheck && bun run test
          - target: think
            command: bun run typecheck && bun run test
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install compatibility dependencies
        working-directory: compat/${{ matrix.target }}
        run: bun install --frozen-lockfile

      - name: Verify compatibility
        working-directory: compat/${{ matrix.target }}
        run: ${{ matrix.command }}
